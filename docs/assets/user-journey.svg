<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">MediLink user journey</title>
  <desc id="desc">Patient finds a doctor, starts or books a consultation, chats or calls, receives prescription, and orders medicine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#0891b2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .step-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .step-text { font: 400 13px Arial, sans-serif; fill: #475569; }
      .num { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #0891b2; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1100" height="420" fill="url(#bg)"/>
  <text x="56" y="62" class="title">Patient Care Journey</text>
  <text x="56" y="92" class="subtitle">A simple flow from discovery to consultation, prescription, and medicine order.</text>
  <g filter="url(#shadow)">
    <rect x="56" y="160" width="150" height="140" rx="8" fill="#ffffff"/>
    <circle cx="100" cy="205" r="24" fill="#0ea5e9"/>
    <text x="93" y="212" class="num">1</text>
    <text x="86" y="245" class="step-title">Find</text>
    <text x="82" y="270" class="step-text">Search doctors</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="250" y="160" width="150" height="140" rx="8" fill="#ffffff"/>
    <circle cx="294" cy="205" r="24" fill="#10b981"/>
    <text x="287" y="212" class="num">2</text>
    <text x="280" y="245" class="step-title">Choose</text>
    <text x="274" y="270" class="step-text">Now or later</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="444" y="160" width="150" height="140" rx="8" fill="#ffffff"/>
    <circle cx="488" cy="205" r="24" fill="#0ea5e9"/>
    <text x="481" y="212" class="num">3</text>
    <text x="474" y="245" class="step-title">Consult</text>
    <text x="464" y="270" class="step-text">Chat or video</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="638" y="160" width="150" height="140" rx="8" fill="#ffffff"/>
    <circle cx="682" cy="205" r="24" fill="#10b981"/>
    <text x="675" y="212" class="num">4</text>
    <text x="663" y="245" class="step-title">Receive</text>
    <text x="660" y="270" class="step-text">Prescription</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="832" y="160" width="150" height="140" rx="8" fill="#ffffff"/>
    <circle cx="876" cy="205" r="24" fill="#0ea5e9"/>
    <text x="869" y="212" class="num">5</text>
    <text x="865" y="245" class="step-title">Order</text>
    <text x="858" y="270" class="step-text">Medicines</text>
  </g>
  <path class="line" d="M206 230 H247"/>
  <path class="line" d="M400 230 H441"/>
  <path class="line" d="M594 230 H635"/>
  <path class="line" d="M788 230 H829"/>
  <rect x="56" y="342" width="926" height="44" rx="8" fill="#ecfeff" stroke="#bae6fd"/>
  <text x="84" y="369" class="subtitle">Realtime updates keep consultations, notifications, and incoming call states fresh across the app.</text>
</svg>
