<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460" role="img" aria-labelledby="title desc">
  <title id="title">MediLink role dashboards</title>
  <desc id="desc">Patient, doctor, and admin dashboards share one platform while keeping role-specific actions separate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .item { font: 400 15px Arial, sans-serif; fill: #334155; }
      .badge { font: 700 12px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1100" height="460" fill="url(#bg)"/>
  <text x="56" y="64" class="title">Role-Based Product Areas</text>
  <text x="56" y="94" class="subtitle">Each role gets focused navigation, actions, and data while sharing the same backend platform.</text>
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="300" height="240" rx="8" fill="#ffffff"/>
    <rect x="70" y="150" width="300" height="58" rx="8" fill="#0ea5e9"/>
    <text x="100" y="187" class="badge">PATIENT</text>
    <text x="100" y="246" class="card-title">Care access</text>
    <text x="100" y="282" class="item">Doctor discovery</text>
    <text x="100" y="314" class="item">Consultations and appointments</text>
    <text x="100" y="346" class="item">Prescriptions and orders</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="150" width="300" height="240" rx="8" fill="#ffffff"/>
    <rect x="400" y="150" width="300" height="58" rx="8" fill="#10b981"/>
    <text x="430" y="187" class="badge">DOCTOR</text>
    <text x="430" y="246" class="card-title">Clinical work</text>
    <text x="430" y="282" class="item">Availability status</text>
    <text x="430" y="314" class="item">Chat and video rooms</text>
    <text x="430" y="346" class="item">Prescription creation</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="730" y="150" width="300" height="240" rx="8" fill="#ffffff"/>
    <rect x="730" y="150" width="300" height="58" rx="8" fill="#2563eb"/>
    <text x="760" y="187" class="badge">ADMIN</text>
    <text x="760" y="246" class="card-title">Operations</text>
    <text x="760" y="282" class="item">Users and doctors</text>
    <text x="760" y="314" class="item">Medicine inventory</text>
    <text x="760" y="346" class="item">Orders and platform checks</text>
  </g>
</svg>
