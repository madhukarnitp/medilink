<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">MediLink architecture overview</title>
  <desc id="desc">React frontend connects to Express API and Socket.IO realtime server. Backend and realtime services both use MongoDB.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#effaf7"/>
      <stop offset="55%" stop-color="#eaf5ff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .card-text { font: 400 14px Arial, sans-serif; fill: #475569; }
      .label { font: 700 13px Arial, sans-serif; fill: #2563eb; }
      .pill { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-green { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1100" height="560" rx="0" fill="url(#bg)"/>
  <text x="64" y="70" class="title">MediLink System Architecture</text>
  <text x="64" y="100" class="subtitle">Three services work together: frontend experience, REST business API, and realtime consultation events.</text>
  <g filter="url(#shadow)">
    <rect x="70" y="180" width="250" height="160" rx="8" fill="#ffffff"/>
    <rect x="70" y="180" width="250" height="10" rx="5" fill="url(#blue)"/>
    <text x="100" y="225" class="card-title">React + Vite App</text>
    <text x="100" y="257" class="card-text">Patient dashboard</text>
    <text x="100" y="282" class="card-text">Doctor workspace</text>
    <text x="100" y="307" class="card-text">Admin panels</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="425" y="130" width="260" height="160" rx="8" fill="#ffffff"/>
    <rect x="425" y="130" width="260" height="10" rx="5" fill="url(#green)"/>
    <text x="455" y="175" class="card-title">Express REST API</text>
    <text x="455" y="207" class="card-text">Auth, doctors, patients</text>
    <text x="455" y="232" class="card-text">Appointments, prescriptions</text>
    <text x="455" y="257" class="card-text">Orders, reports, admin</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="425" y="335" width="260" height="160" rx="8" fill="#ffffff"/>
    <rect x="425" y="335" width="260" height="10" rx="5" fill="url(#blue)"/>
    <text x="455" y="380" class="card-title">Socket.IO Server</text>
    <text x="455" y="412" class="card-text">Presence and rooms</text>
    <text x="455" y="437" class="card-text">Chat and typing events</text>
    <text x="455" y="462" class="card-text">WebRTC signaling</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="790" y="220" width="240" height="180" rx="8" fill="#ffffff"/>
    <rect x="790" y="220" width="240" height="10" rx="5" fill="url(#green)"/>
    <text x="820" y="265" class="card-title">MongoDB</text>
    <text x="820" y="297" class="card-text">Users and roles</text>
    <text x="820" y="322" class="card-text">Consultation history</text>
    <text x="820" y="347" class="card-text">Orders and prescriptions</text>
    <text x="820" y="372" class="card-text">Vitals and reports</text>
  </g>
  <path class="line" d="M320 230 C360 225 385 215 425 205"/>
  <text x="337" y="207" class="label">REST /api</text>
  <path class="line-green" d="M320 295 C360 335 385 390 425 415"/>
  <text x="326" y="365" class="label">Socket events</text>
  <path class="line-green" d="M685 205 C725 215 750 240 790 270"/>
  <text x="704" y="226" class="label">Mongoose</text>
  <path class="line-green" d="M685 415 C730 392 750 365 790 335"/>
  <text x="704" y="390" class="label">Shared data</text>
  <path class="line" d="M555 290 C555 310 555 318 555 335"/>
  <text x="575" y="318" class="label">internal emit bridge</text>
  <rect x="70" y="414" width="250" height="46" rx="8" fill="#0f766e"/>
  <text x="95" y="443" class="pill">JWT secures API and realtime access</text>
</svg>
